<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐼</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoTravel - 页面重定向</title>
    <script>
      // GitHub Pages SPA 路由回退 - 支持 /go-travel/ 基础路径
      (function() {
        const basePath = '/go-travel/';
        const currentPath = window.location.pathname;
        
        // 如果当前路径不是以基础路径开头，重定向到基础路径
        if (!currentPath.startsWith(basePath)) {
          const newPath = basePath + currentPath.replace(/^\//, '');
          window.location.replace(newPath + window.location.search + window.location.hash);
          return;
        }
        
        // 处理 SPA 路由
        const segmentCount = basePath.split('/').filter(Boolean).length;
        const l = window.location;
        
        // 移除基础路径部分
        const pathWithoutBase = l.pathname.replace(new RegExp('^' + basePath), '/');
        
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          basePath + '?p=' +
          encodeURIComponent(pathWithoutBase) +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>请启用 JavaScript 以访问 GoTravel 应用。</p>
    </noscript>
  </body>
</html>
